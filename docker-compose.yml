services:
  postgres:
    image: postgres:16
    container_name: agenttrace-postgres
    environment:
      POSTGRES_DB: agenttrace
      POSTGRES_USER: agenttrace
      POSTGRES_PASSWORD: agenttrace
    ports:
      - "5432:5432"
    volumes:
      - agenttrace_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agenttrace-redis
    ports:
      - "6379:6379"
    volumes:
      - agenttrace_redisdata:/data

volumes:
  agenttrace_pgdata:
  agenttrace_redisdata:

