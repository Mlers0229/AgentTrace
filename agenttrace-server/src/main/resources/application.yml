server:
  port: 8080

spring:
  application:
    name: agenttrace-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenttrace}
    username: ${SPRING_DATASOURCE_USERNAME:agenttrace}
    password: ${SPRING_DATASOURCE_PASSWORD:agenttrace}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: disabled
      password: disabled

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

knife4j:
  enable: true

